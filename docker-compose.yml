version: "3.8"

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - SEED_MODE=false
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./dashboard/.env.local
    restart: unless-stopped
